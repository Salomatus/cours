{% extends 'base.html' %}

{% block content %}
    <div class="row pt-3 pb-2 mb-3">
    <div class="col-lg-6 col-md-8 mx-auto">
        <div class="card mb-4 box-shadow">
            <div class="card-header">
                {% if object %}
                <h4 class="my-0 font-weight-normal">Редактирование информации о клиенте</h4>
                {% else %}
                <h4 class="my-0 font-weight-normal">Создание нового клиента</h4>
                {% endif %}
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    {% if object %}
                    <button type="submit" class="btn btn-outline-secondary btn-sm">Изменить</button>
                    {% else %}
                    <button type="submit" class="btn btn-outline-secondary btn-sm">Добавить</button>
                    {% endif %}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}

    <p>Вы уверены, что хотите удалить клиента "{{ object.full_name }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Удалить</button>
        <a href="{% url 'mailing:client_list' %}">Отмена</a>
    </form>
{% endblock %}

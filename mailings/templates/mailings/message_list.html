{% extends 'base.html' %}

{% block content %}
    <h2>Сообщения</h2>
    <a href="{% url 'mailing:message_create' %}">Создать сообщение</a>
    <ul>
        {% for message in messages %}
            <li>
                {{ message.subject }} - {{ message.body }}
                <a href="{% url 'mailing:message_update' message.pk %}">Изменить</a>
                <a href="{% url 'mailing:message_delete' message.pk %}">Удалить</a>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
